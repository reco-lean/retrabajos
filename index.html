<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Incidencias y Desviaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="glass-card p-4 p-md-5">
                    <div class="text-center mb-4 header-logo">
                        <h2 class="fw-bold text-white mb-0">CONTROL OPERATIVO</h2>
                        <p class="text-accent small text-uppercase tracking-wide">Registro de Desviaciones e Incidencias</p>
                    </div>

                    <form id="form">
                        <div class="mb-3">
                            <label class="form-label requerido">Clasificación del Servicio:</label>
                            <select id="servicio" class="form-select custom-select">
                                <option value="" disabled selected>Seleccione la clasificación</option>
                                <option value="QPSuite">Gestión QPSuite / Trazabilidad</option>
                                <option value="Inspecciones">Inspecciones</option>
                                <option value="Máquinas y Herramientas">Máquinas y Herramientas</option>
                                <option value="Grateado y Sandblasting">Grateado y Sandblasting</option>
                                <option value="Soldadura">Soldadura</option>
                                <option value="Lavado">Lavado</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                                <option value="Herramentería">Herramentería</option>
                                <option value="Alistamiento">Programación y alistamiento</option>
                                <option value="Puente grúa">Puente grúa</option>
                                <option value="Montacargas">Montacargas</option>
                                <option value="Devoluciones">Devoluciones</option>
                                <option value="Pedido adicional">Pedido adicional</option>
                                <option value="Planeación">Planeación</option>
                                <option value="Ejecución">Ejecución</option>
                            </select>                               
                        </div>

                        <div class="mb-3">
                            <label class="form-label requerido">Centro de Trabajo / Área:</label>
                            <select id="taller" class="form-select custom-select">
                                <option value="" disabled selected>Seleccione el área de ejecución</option>
                                <option value="Cilindros">Cilindros</option>
                                <option value="Motores">Motores</option>
                                <option value="Eléctrico">Eléctrico</option>
                                <option value="Tren de Potencia">Tren de Potencia</option>
                                <option value="Máquinas y Herramientas">Máquinas y Herramientas</option>
                            </select>                               
                        </div>

                        <div class="mb-3">
                            <label class="form-label requerido" id="labelClasificacion">Categoría de la Incidencia:</label>
                            <select id="tipo_desperdicio" class="form-select custom-select">
                                <option value="" disabled selected>Seleccione primero un servicio</option>
                            </select>                               
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label requerido">Componente Principal:</label>
                            <select id="componente" class="form-select custom-select">
                                <option value="" disabled selected>Despliegue para seleccionar</option>
                                <option value="Freno de camión">Freno de camión</option>
                                <option value="Componente menor de motor">Componente menor de motor</option>
                                <option value="Motor de camión">Motor de camión</option>
                                <option value="Mando final de camión">Mando final de camión</option>
                                <option value="Suspensión frontal de camión">Suspensión frontal de camión</option>
                                <option value="Suspensión trasera de camión">Suspensión trasera de camión</option>
                                <option value="Rueda de suspensión frontal de camión">Rueda de suspensión frontal de camión</option>
                                <option value="Motor de tractor de llantas">Motor de tractor de llantas</option>
                                <option value="Mando final de tractor de llantas">Mando final de tractor de llantas</option>
                                <option value="Motor de tractor de oruga">Motor de tractor de oruga</option>
                                <option value="Mando final de tractor de oruga">Mando final de tractor de oruga</option>
                                <option value="Motor de motoniveladora">Motor de motoniveladora</option>
                                <option value="Motor de tanquero">Motor de tanquero</option>
                                <option value="Mando final de tanquero">Mando final de tanquero</option>
                                <option value="Suspensión frontal de tanquero">Suspensión frontal de tanquero</option>
                            </select>
                        </div>
                    
                        <div class="mb-3" id="campoSubComponente">
                            <label class="form-label requerido">Subconjunto / Parte:</label>
                            <input type="text" id="subComponente" class="form-control custom-input" placeholder="Ej. Bloque principal, Carter, Culata">
                        </div>
                        
                        <div class="mb-3 d-none" id="campoEquipo">
                            <label class="form-label">Identificación del Equipo:</label>
                            <input type="text" id="equipo" class="form-control custom-input" placeholder="ID / Serial del equipo">
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label requerido">Orden de Trabajo:</label>
                                <input type="text" id="ot" class="form-control custom-input text-uppercase" placeholder="OT-">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label requerido">Fecha:</label>
                                <input type="date" id="fecha" class="form-control custom-input">
                            </div>
                        </div>
                    
                        <div class="mb-3" id="campoTiempo">
                            <label class="form-label">Desviación en Horas (Tiempo improductivo):</label>
                            <input type="number" id="tiempo" step="0.1" class="form-control custom-input" placeholder="Ej. 1.5">
                        </div>

                        <div class="mb-4">
                            <label class="form-label" id="labelComentario">Detalle Técnico / Observaciones:</label>
                            <textarea id="comentario" class="form-control custom-input" rows="3" placeholder="Describa el contexto operativo y el impacto de la desviación..."></textarea>
                        </div>
                    
                        <button id="btnEnviar" type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold">
                            DOCUMENTAR INCIDENCIA
                            <span class="spinner-border spinner-border-sm ms-2" id="spinner" style="display:none;"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
